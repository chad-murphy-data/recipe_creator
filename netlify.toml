[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Route the browser's /api/* to the serverless functions.
# These must come before the SPA fallback below.
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200
  force = true

[[redirects]]
  from = "/api/recipes"
  to = "/.netlify/functions/recipes"
  status = 200
  force = true

# Single-page app: send everything else to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
